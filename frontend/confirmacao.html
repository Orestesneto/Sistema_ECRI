<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Participacao - ECRI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container py-4" style="max-width: 760px;">
        <div class="text-center mb-3">
            <img src="assets/logo-ecri.png" alt="ECRI" class="login-logo">
            <div class="ecri-stripe"></div>
        </div>
        <h2>Confirmar Participacao</h2>
        <div id="alertaConfirmacao" class="alert mt-3" style="display:none;"></div>

        <form id="formConfirmacao" class="card p-4 shadow-sm mt-3" style="display:none;">
            <div class="text-center mb-3" id="fotoConfirmacao"></div>

            <div class="mb-3">
                <label class="form-label">Movimento de origem</label>
                <select class="form-select" id="confirmacaoMovimento" required>
                    <option value="">Selecione...</option>
                    <option value="EC">EC</option>
                    <option value="EJC">EJC</option>
                    <option value="ECC">ECC</option>
                    <option value="JOVENS EJC CASADOS">Jovens EJC casados</option>
                    <option value="ECRI">ECRI</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Foto de perfil</label>
                <input type="file" class="form-control" id="confirmacaoFoto" accept=".jpg,.jpeg,.png,.heif,.heic,.webp,image/jpeg,image/png,image/heif,image/heic,image/webp" required>
                <small class="text-muted">Formatos: JPG, PNG, HEIF ou WEBP (max 3MB)</small>
            </div>

            <input type="hidden" id="confirmacaoNome">

            <div class="mb-3" id="confirmacaoDadosIndividual">
                <label class="form-label">Nome completo</label>
                <input type="text" class="form-control" id="confirmacaoNomeIndividual">
            </div>

            <div id="confirmacaoDadosCasal" style="display:none;">
                <div class="mb-3">
                    <label class="form-label">Como o marido gosta de ser chamado</label>
                    <input type="text" class="form-control" id="confirmacaoNomeMarido">
                </div>
                <div class="mb-3">
                    <label class="form-label">Como a esposa gosta de ser chamada</label>
                    <input type="text" class="form-control" id="confirmacaoNomeEsposa">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contato WhatsApp Esposa</label>
                    <input type="tel" class="form-control" id="confirmacaoTelefoneEsposa" placeholder="(11) 99999-9999">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contato WhatsApp Marido</label>
                    <input type="tel" class="form-control" id="confirmacaoTelefoneMarido" placeholder="(11) 99999-9999">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Nome para o Crachá</label>
                <input type="text" class="form-control" id="confirmacaoNomeCracha" required>
            </div>

            <div class="mb-3" id="confirmacaoTelefoneIndividual">
                <label class="form-label">Telefone WhatsApp</label>
                <input type="tel" class="form-control" id="confirmacaoTelefone" required>
            </div>

            <div id="dadosLoginSemCadastro" style="display:none;">
                <div class="mb-3">
                    <label class="form-label">CPF</label>
                    <input type="text" class="form-control" id="confirmacaoCpf" inputmode="numeric" pattern="[0-9]*" maxlength="11">
                    <small class="text-muted">Somente números</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Data de nascimento</label>
                    <input type="text" class="form-control" id="confirmacaoDataNascimento" inputmode="numeric" pattern="[0-9]*" maxlength="8">
                    <small class="text-muted">Somente números. Exemplo: 25061995</small>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Qual o ano que você fez o encontro?</label>
                <input type="text" class="form-control" id="confirmacaoAnoEncontro" inputmode="numeric" pattern="[0-9]*" maxlength="4" required>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">A qual paróquia você pertence?</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paroquiaConfirmacao" id="paroquiaConfirmacaoGuia" value="NOSSA SENHORA DA GUIA" required>
                    <label class="form-check-label" for="paroquiaConfirmacaoGuia">Nossa Senhora da Guia</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paroquiaConfirmacao" id="paroquiaConfirmacaoPedroPaulo" value="SAO PEDRO E SAO PAULO" required>
                    <label class="form-check-label" for="paroquiaConfirmacaoPedroPaulo">São Pedro e São Paulo</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="paroquiaConfirmacao" id="paroquiaConfirmacaoOutras" value="OUTRAS" required>
                    <label class="form-check-label" for="paroquiaConfirmacaoOutras">Outras. Qual?</label>
                </div>
            </div>
            <div class="mb-3" id="campoOutraParoquiaConfirmacao" style="display:none;">
                <label class="form-label">Nome da paróquia</label>
                <input type="text" class="form-control" id="outraParoquiaConfirmacao">
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Você toca algum instrumento?</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoTocaInstrumento" id="confirmacaoTocaInstrumentoSim" value="sim" required>
                    <label class="form-check-label" for="confirmacaoTocaInstrumentoSim">Sim</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoTocaInstrumento" id="confirmacaoTocaInstrumentoNao" value="nao" required>
                    <label class="form-check-label" for="confirmacaoTocaInstrumentoNao">Não</label>
                </div>
            </div>
            <div class="mb-3" id="campoInstrumentosConfirmacao" style="display:none;">
                <label class="form-label">Qual instrumentos?</label>
                <input type="text" class="form-control" id="confirmacaoInstrumentos">
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Você canta?</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoCanta" id="confirmacaoCantaSim" value="sim" required>
                    <label class="form-check-label" for="confirmacaoCantaSim">Sim</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoCanta" id="confirmacaoCantaNao" value="nao" required>
                    <label class="form-check-label" for="confirmacaoCantaNao">Não</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Quais dessas equipes você já serviu?</label>
                <div class="row g-2">
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaApresentadores" value="APRESENTADORES"><label class="form-check-label" for="confirmacaoEquipeServidaApresentadores">Apresentadores</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaCirculos" value="CIRCULOS/ ARCOS / GRUPOS"><label class="form-check-label" for="confirmacaoEquipeServidaCirculos">Circulos/ Arcos / Grupos</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaEcrishop" value="ECRISHOP/ MINI BOX / BODEGA"><label class="form-check-label" for="confirmacaoEquipeServidaEcrishop">ECRISHOP/ Mini box / bodega</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaBandinha" value="BANDINHA"><label class="form-check-label" for="confirmacaoEquipeServidaBandinha">Bandinha</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaBoaAcao" value="BOA ACAO / BOA VONTADE / BEM ESTAR"><label class="form-check-label" for="confirmacaoEquipeServidaBoaAcao">Boa Ação / Boa Vontade / Bem estar</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaLiturgia" value="LIRTUGIA"><label class="form-check-label" for="confirmacaoEquipeServidaLiturgia">Liturgia</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaSecretaria" value="SECRETARIA / PAPELARIA / ESCRITA"><label class="form-check-label" for="confirmacaoEquipeServidaSecretaria">Secretaria / papelaria / Escrita</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaTeatro" value="TRANSITO E SOCIODRAMA / TEATRO/ TEATRINHO"><label class="form-check-label" for="confirmacaoEquipeServidaTeatro">Transito e Sociodrama / Teatro/ Teatrinho</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaAlegria" value="ANJOS DA ALEGRIA"><label class="form-check-label" for="confirmacaoEquipeServidaAlegria">Anjos da Alegria</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaGuarda" value="ANJOS DA GUARDA"><label class="form-check-label" for="confirmacaoEquipeServidaGuarda">Anjos da Guarda</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaOrdem" value="ORDEM / VASSOURINHA"><label class="form-check-label" for="confirmacaoEquipeServidaOrdem">Ordem / vassourinha</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaLanchinho" value="LANCHINHO/ PAPA LANCHE"><label class="form-check-label" for="confirmacaoEquipeServidaLanchinho">Lanchinho/ Papa Lanche</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaCozinha" value="COZINHA / RANGUINHO"><label class="form-check-label" for="confirmacaoEquipeServidaCozinha">Cozinha / Ranguinho</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaSom" value="SOM E ILUMINACAO"><label class="form-check-label" for="confirmacaoEquipeServidaSom">Som e Iluminação</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaCompras" value="COMPRAS"><label class="form-check-label" for="confirmacaoEquipeServidaCompras">Compras</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaRecepcao" value="RECPCAO AOS PALESTRANTES"><label class="form-check-label" for="confirmacaoEquipeServidaRecepcao">Recepção aos palestrantes</label></div></div>
                    <div class="col-sm-6"><div class="form-check"><input class="form-check-input" type="checkbox" name="confirmacaoEquipesServidas" id="confirmacaoEquipeServidaVisitacao" value="VISITACAO E EXTERNA/ COMUNICACAO E INFORMACAO"><label class="form-check-label" for="confirmacaoEquipeServidaVisitacao">Visitação e Externa/ Comunicação e Informação</label></div></div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Possui restrição médica?</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoTemRestricaoMedica" id="confirmacaoTemRestricaoMedicaSim" value="sim" required>
                    <label class="form-check-label" for="confirmacaoTemRestricaoMedicaSim">Sim</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoTemRestricaoMedica" id="confirmacaoTemRestricaoMedicaNao" value="nao" required>
                    <label class="form-check-label" for="confirmacaoTemRestricaoMedicaNao">Não</label>
                </div>
            </div>
            <div class="mb-3" id="campoConfirmacaoRestricaoMedica" style="display:none;">
                <label class="form-label">Qual restrição médica?</label>
                <input type="text" class="form-control" id="confirmacaoRestricaoMedica">
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Possui restrição alimentar?</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoTemRestricaoAlimentar" id="confirmacaoTemRestricaoAlimentarSim" value="sim" required>
                    <label class="form-check-label" for="confirmacaoTemRestricaoAlimentarSim">Sim</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoTemRestricaoAlimentar" id="confirmacaoTemRestricaoAlimentarNao" value="nao" required>
                    <label class="form-check-label" for="confirmacaoTemRestricaoAlimentarNao">Não</label>
                </div>
            </div>
            <div class="mb-3" id="campoConfirmacaoRestricaoAlimentar" style="display:none;">
                <label class="form-label">Qual restrição alimentar?</label>
                <input type="text" class="form-control" id="confirmacaoRestricaoAlimentar">
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Possui restrição à medicação?</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoTemRestricaoMedicacao" id="confirmacaoTemRestricaoMedicacaoSim" value="sim" required>
                    <label class="form-check-label" for="confirmacaoTemRestricaoMedicacaoSim">Sim</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="confirmacaoTemRestricaoMedicacao" id="confirmacaoTemRestricaoMedicacaoNao" value="nao" required>
                    <label class="form-check-label" for="confirmacaoTemRestricaoMedicacaoNao">Não</label>
                </div>
            </div>
            <div class="mb-3" id="campoConfirmacaoRestricaoMedicacao" style="display:none;">
                <label class="form-label">Qual restrição à medicação?</label>
                <input type="text" class="form-control" id="confirmacaoRestricaoMedicacao">
            </div>

            <div class="mb-3">
                <label class="form-label">Participacao</label>
                <select class="form-select" id="confirmacaoStatus" required>
                    <option value="confirmado">Confirmo minha participação</option>
                    <option value="negou">Não poderei participar</option>
                    <option value="desistiu">Desisti da participação</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Enviar confirmação</button>
        </form>
    </div>

    <footer class="app-footer">
        <div>Desenvolvido por Orestes Neto</div>
        <a href="https://wa.me/5583996552101" target="_blank" rel="noopener">Contato WhatsApp (83) 99655-2101</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="js/paroquia.js"></script>
    <script src="js/foto-perfil.js?v=20260626-300kb-proporcional"></script>
    <script src="js/confirmacao.js?v=20260626-restricoes-sim-nao"></script>
</body>
</html>
