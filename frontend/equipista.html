<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Equipista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand"><img src="assets/logo-ecri.png" alt="ECRI" class="brand-logo">Sistema ECRI - Equipista</span>
            <button class="btn btn-outline-light" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h2>Bem-vindo, <span id="nomeUsuario"></span></h2>
                <hr>
            </div>
        </div>

        <!-- Abas de Navegação -->
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#meuPerfil">Meu Perfil</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#blusa">Solicitar Blusa</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#pagamento">Pagamento</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#status">Status</a>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Aba Meu Perfil -->
            <div id="meuPerfil" class="tab-pane fade show active">
                <div class="row">
                    <div class="col-md-6">
                        <h3>Meus Dados</h3>
                        <form id="formPerfil">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="nomeCompleto" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nome para o Crachá</label>
                                <input type="text" class="form-control" id="nomeCracha">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Telefone</label>
                                <input type="tel" class="form-control" id="telefone" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Movimento de Origem</label>
                                <div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoEC" value="EC" required>
                                        <label class="form-check-label" for="movimentoEC">EC</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoEJC" value="EJC" required>
                                        <label class="form-check-label" for="movimentoEJC">EJC</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoECC" value="ECC" required>
                                        <label class="form-check-label" for="movimentoECC">ECC</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoJovensEjcCasados" value="JOVENS EJC CASADOS" required>
                                        <label class="form-check-label" for="movimentoJovensEjcCasados">Jovens EJC casados</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoECRI" value="ECRI" required>
                                        <label class="form-check-label" for="movimentoECRI">ECRI</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Qual o ano que voce fez o encontro?</label>
                                <input type="text" class="form-control" id="anoEncontro" inputmode="numeric" maxlength="4" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Foto de Perfil</label>
                                <input type="file" class="form-control" id="fotoPerfil" accept="image/*">
                                <small class="text-muted">Formatos: JPG, PNG (máx 15MB)</small>
                            </div>
                            <div id="previewFoto" class="mb-3">
                                <img id="fotoPreview" src="" alt="Preview" style="max-width:150px; display:none;">
                            </div>
                            <div id="camposExperienciaEquipista"></div>
                            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                        </form>
                    </div>
                    <div class="col-md-6">
                        <h3>Restrições e Informações Médicas</h3>
                        <form id="formRestricoes">
                            <div class="mb-3">
                                <label class="form-label">Restrição Médica</label>
                                <input type="text" class="form-control" id="restricaoMedica" placeholder="Ex: Alergia, Diabetes...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Restrição Alimentar</label>
                                <input type="text" class="form-control" id="restricaoAlimentar" placeholder="Ex: Vegetariano, Alérgico...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Restrição de Medicação</label>
                                <input type="text" class="form-control" id="restricaoMedicacao" placeholder="Ex: Alérgico a Penicilina...">
                            </div>
                            <button type="submit" class="btn btn-primary">Salvar Restrições</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Aba Blusa -->
            <div id="blusa" class="tab-pane fade">
                <h3>Solicitar Blusa</h3>
                <form id="formBlusa" class="mt-3">
                    <div class="mb-3">
                        <label class="form-label">Tamanho</label>
                        <select class="form-select" id="tamanho" required>
                            <option value="">Selecione...</option>
                            <option value="PP">PP</option>
                            <option value="P">P</option>
                            <option value="M">M</option>
                            <option value="G">G</option>
                            <option value="GG">GG</option>
                            <option value="XG">XG</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Solicitar</button>
                </form>
            </div>

            <!-- Aba Pagamento -->
            <div id="pagamento" class="tab-pane fade">
                <h3>Solicitar Pagamento</h3>
                <form id="formPagamento" class="mt-3">
                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" id="tipoPagamento" required>
                            <option value="">Selecione...</option>
                            <option value="taxa">Taxa</option>
                            <option value="blusa">Blusa</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor (R$)</label>
                        <input type="number" class="form-control" id="valorPagamento" step="0.01" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Solicitar Pagamento</button>
                </form>
            </div>

            <!-- Aba Status -->
            <div id="status" class="tab-pane fade">
                <h3>Meu Status</h3>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <h5>Pagamentos</h5>
                        <div id="listaPagamentos"></div>
                    </div>
                    <div class="col-md-6">
                        <h5>Blusas</h5>
                        <div id="listaBlusas"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="alertaEquipista" class="alert mt-3" role="alert" style="display:none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/perfil-experiencia.js"></script>
    <script src="js/equipista.js"></script>
</body>
</html>
