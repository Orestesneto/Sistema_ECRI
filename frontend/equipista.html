<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Equipista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand"><img src="assets/logo-ecri.png" alt="ECRI" class="brand-logo">Sistema ECRI - Equipista</span>
            <button class="btn btn-outline-light" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h2>Bem-vindo, <span id="nomeUsuário"></span></h2>
                <hr>
            </div>
        </div>

        <!-- Abas de Navegação -->
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#meuPerfil">Meu Perfil</a>
            </li>
            <li class="nav-item d-none" id="abaSolicitarBlusa">
                <a class="nav-link" data-bs-toggle="tab" href="#blusa">Solicitar Blusa</a>
            </li>
            <li class="nav-item d-none" id="abaPagamentoOnline">
                <a class="nav-link" data-bs-toggle="tab" href="#pagamentoOnline">Pagamento Pix ou Cartão de Crédito</a>
            </li>
            <li class="nav-item d-none" id="abaStatus">
                <a class="nav-link" data-bs-toggle="tab" href="#status">Status</a>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Aba Meu Perfil -->
            <div id="meuPerfil" class="tab-pane fade show active">
                <div class="row">
                    <div class="col-md-6">
                        <h3>Meus Dados</h3>
                        <form id="formPerfil">
                            <div class="mb-3">
                                <label class="form-label">Movimento de Origem</label>
                                <div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoEC" value="EC" required>
                                        <label class="form-check-label" for="movimentoEC">EC</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoEJC" value="EJC" required>
                                        <label class="form-check-label" for="movimentoEJC">EJC</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoECC" value="ECC" required>
                                        <label class="form-check-label" for="movimentoECC">ECC</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoJovensEjcCasados" value="JOVENS EJC CASADOS" required>
                                        <label class="form-check-label" for="movimentoJovensEjcCasados">Jovens EJC casados</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="movimento" id="movimentoECRI" value="ECRI" required>
                                        <label class="form-check-label" for="movimentoECRI">ECRI</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="nomeCompleto" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nome para o Crachá</label>
                                <input type="text" class="form-control" id="nomeCracha">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Telefone</label>
                                <input type="tel" class="form-control" id="telefone" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label d-block">A qual paróquia você pertence?</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paroquia" id="paroquiaGuia" value="NOSSA SENHORA DA GUIA" required>
                                    <label class="form-check-label" for="paroquiaGuia">Nossa Senhora da Guia</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paroquia" id="paroquiaPedroPaulo" value="SAO PEDRO E SAO PAULO" required>
                                    <label class="form-check-label" for="paroquiaPedroPaulo">São Pedro e São Paulo</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paroquia" id="paroquiaOutras" value="OUTRAS" required>
                                    <label class="form-check-label" for="paroquiaOutras">Outras. Qual?</label>
                                </div>
                            </div>
                            <div class="mb-3" id="campoOutraParoquia" style="display:none;">
                                <label class="form-label" for="outraParoquia">Nome da paróquia</label>
                                <input type="text" class="form-control" id="outraParoquia">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Qual o ano que você fez o encontro?</label>
                                <input type="text" class="form-control" id="anoEncontro" inputmode="numeric" maxlength="4" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Foto de Perfil</label>
                                <input type="file" class="form-control" id="fotoPerfil" accept="image/*">
                                <small class="text-muted">Formatos: JPG, PNG (máx 1MB)</small>
                            </div>
                            <div id="previewFoto" class="mb-3">
                                <img id="fotoPreview" src="" alt="Preview" style="max-width:150px; display:none;">
                            </div>
                            <div id="camposExperienciaEquipista"></div>
                            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                        </form>
                    </div>
                    <div class="col-md-6">
                        <h3>Restrições e Informações Médicas</h3>
                        <form id="formRestricoes">
                            <div class="mb-3">
                                <label class="form-label">Restrição Médica</label>
                                <input type="text" class="form-control" id="restricaoMedica" placeholder="Ex: Alergia, Diabetes...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Restrição Alimentar</label>
                                <input type="text" class="form-control" id="restricaoAlimentar" placeholder="Ex: Vegetariano, Alérgico...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Restrição à medicação</label>
                                <input type="text" class="form-control" id="restricaoMedicacao" placeholder="Ex: Alérgico a Penicilina...">
                            </div>
                            <button type="submit" class="btn btn-primary">Salvar Restrições</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Aba Blusa -->
            <div id="blusa" class="tab-pane fade d-none">
                <h3>Solicitar Blusa</h3>
                <form id="formBlusa" class="mt-3">
                    <div class="mb-3">
                        <label class="form-label">Tamanho</label>
                        <select class="form-select" id="tamanho" required>
                            <option value="">Selecione...</option>
                            <option value="8 Anos">8 Anos</option>
                            <option value="10 Anos">10 Anos</option>
                            <option value="12 Anos">12 Anos</option>
                            <option value="14 Anos (PP Babylook)">14 Anos (PP Babylook)</option>
                            <option value="P Babylook">P Babylook</option>
                            <option value="M Babylook">M Babylook</option>
                            <option value="G Babylook">G Babylook</option>
                            <option value="GG Babylook">GG Babylook</option>
                            <option value="EXGG Babylook">EXGG Babylook</option>
                            <option value="PP Unisex">PP Unisex</option>
                            <option value="P Unisex">P Unisex</option>
                            <option value="M Unisex">M Unisex</option>
                            <option value="G Unisex">G Unisex</option>
                            <option value="GG Unisex">GG Unisex</option>
                            <option value="EXGG Unisex">EXGG Unisex</option>
                            <option value="XL Unisex">XL Unisex</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Solicitar</button>
                </form>
            </div>

            <!-- Aba Pagamento Pix ou Cartão de Crédito -->
            <div id="pagamentoOnline" class="tab-pane fade d-none">
                <h3>Pagamento Pix ou Cartão de Crédito</h3>
                <form id="formPagamento" class="mt-3">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label" for="tipoPagamento">Tipo</label>
                            <select class="form-select" id="tipoPagamento" required>
                                <option value="taxa">Taxa do encontro</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="valorPagamento">Valor</label>
                            <input type="number" class="form-control" id="valorPagamento" min="0" step="0.01" readonly required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label d-block">Forma</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="formaPagamentoOnline" id="formaPagamentoPix" value="pix" checked>
                                <label class="form-check-label" for="formaPagamentoPix">PIX</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="formaPagamentoOnline" id="formaPagamentoCartao" value="cartao_credito">
                                <label class="form-check-label" for="formaPagamentoCartao">Cartão de Crédito</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success mt-3">Solicitar pagamento</button>
                </form>
                <div id="resultadoPagamentoMercadoPago" class="mt-3"></div>
            </div>

            <!-- Aba Status -->
            <div id="status" class="tab-pane fade d-none">
                <h3>Meu Status</h3>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <h5>Pagamentos</h5>
                        <div id="listaPagamentos"></div>
                    </div>
                    <div class="col-md-6">
                        <h5>Blusas</h5>
                        <div id="listaBlusas"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="alertaEquipista" class="alert mt-3" role="alert" style="display:none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/paroquia.js"></script>
    <script src="js/abas-persistentes.js"></script>
    <script src="js/perfil-experiencia.js"></script>
    <script src="js/equipista.js"></script>
</body>
</html>
