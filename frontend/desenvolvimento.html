<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Exclusiva - Desenvolvimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 1180px;">
        <div class="card shadow-sm" id="cardLoginDev">
            <div class="card-body p-4">
                <div class="text-center mb-3">
                    <img src="assets/logo-ecri.png" alt="ECRI" class="login-logo">
                    <div class="ecri-stripe"></div>
                </div>
                <h1 class="h4 mb-3">Area Exclusiva</h1>
                <form id="formLoginDev">
                    <div class="mb-3">
                        <label class="form-label" for="usuarioDev">Usuario</label>
                        <input type="text" class="form-control" id="usuarioDev" autocomplete="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="senhaDev">Senha</label>
                        <input type="password" class="form-control" id="senhaDev" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm" id="cardAreaDev" style="display:none;">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start gap-3">
                    <div>
                        <h1 class="h4 mb-1">Area Exclusiva da Equipe de Desenvolvimento</h1>
                        <p class="text-muted mb-0" id="usuarioDevLogado"></p>
                    </div>
                    <button type="button" class="btn btn-outline-secondary" id="sairDev">Sair</button>
                </div>

                <hr>

                <ul class="nav nav-tabs mb-3" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="abaLogsDev" data-bs-toggle="tab" data-bs-target="#painelLogsDev" type="button" role="tab">Logs</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="abaCarografoDev" data-bs-toggle="tab" data-bs-target="#painelAbaCarografoDev" type="button" role="tab">Carografo</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="painelLogsDev" role="tabpanel">
                        <div class="d-flex justify-content-between align-items-center gap-3 mb-3">
                            <h2 class="h5 mb-0">Logs de acoes dos usuarios</h2>
                            <button type="button" class="btn btn-sm btn-primary" id="atualizarLogsDev">Atualizar</button>
                        </div>
                        <div id="listaLogsDev" class="table-responsive"></div>
                    </div>

                    <div class="tab-pane fade" id="painelAbaCarografoDev" role="tabpanel">
                        <div class="d-flex justify-content-between align-items-center gap-3 mb-3">
                            <h2 class="h5 mb-0">Carografo</h2>
                            <button type="button" class="btn btn-sm btn-success" id="baixarRelatorioCarografoDev">Baixar Excel</button>
                        </div>

                        <div class="carografo-filtros">
                            <div>
                                <label class="form-label" for="filtroCarografoDevEquipe">Equipe</label>
                                <select class="form-select" id="filtroCarografoDevEquipe">
                                    <option value="">Todas</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label" for="filtroCarografoDevMovimento">Movimento de origem</label>
                                <select class="form-select" id="filtroCarografoDevMovimento">
                                    <option value="">Todos</option>
                                    <option value="EC">EC</option>
                                    <option value="EJC">EJC</option>
                                    <option value="ECC">ECC</option>
                                    <option value="JOVENS EJC CASADOS">Jovens EJC casados</option>
                                    <option value="ECRI">ECRI</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label" for="filtroCarografoDevMusical">Canta ou toca</label>
                                <select class="form-select" id="filtroCarografoDevMusical">
                                    <option value="">Todos</option>
                                    <option value="canta">Canta</option>
                                    <option value="toca">Toca instrumento</option>
                                    <option value="canta_toca">Canta e toca</option>
                                    <option value="canta_ou_toca">Canta ou toca</option>
                                </select>
                            </div>
                            <div class="d-flex align-items-end">
                                <button type="button" class="btn btn-outline-secondary w-100" id="limparFiltrosCarografoDev">Limpar filtros</button>
                            </div>
                        </div>

                        <div id="painelCarografoDev" class="carografo-grid mt-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="alertaDev" class="alert mt-3" style="display:none;"></div>
    </div>

    <div class="modal fade" id="modalResumoCarografoDev" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Resumo do Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalFotoGrandeDev" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Foto do Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="fotoGrandeDevImagem" src="" alt="Foto grande" style="max-width: 100%; max-height: 75vh; border-radius: 10px;">
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarUsuarioDev" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Perfil do Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditarUsuarioDev">
                        <input type="hidden" id="editarDevUsuarioId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" for="editarDevNomeCompleto">Nome completo</label>
                                <input type="text" class="form-control" id="editarDevNomeCompleto" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="editarDevNomeCracha">Nome para o cracha</label>
                                <input type="text" class="form-control" id="editarDevNomeCracha" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="editarDevTelefone">Telefone</label>
                                <input type="tel" class="form-control" id="editarDevTelefone" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" for="editarDevMovimento">Movimento</label>
                                <select class="form-select" id="editarDevMovimento" required>
                                    <option value="">Selecione...</option>
                                    <option value="EC">EC</option>
                                    <option value="EJC">EJC</option>
                                    <option value="ECC">ECC</option>
                                    <option value="JOVENS EJC CASADOS">Jovens EJC casados</option>
                                    <option value="ECRI">ECRI</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" for="editarDevAnoEncontro">Ano do encontro</label>
                                <input type="text" class="form-control" id="editarDevAnoEncontro" inputmode="numeric" maxlength="4" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="editarDevEquipe">Equipe</label>
                                <select class="form-select" id="editarDevEquipe">
                                    <option value="">SEM EQUIPE</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="editarDevStatus">Status</label>
                                <select class="form-select" id="editarDevStatus" required>
                                    <option value="pendente">Pendente</option>
                                    <option value="confirmado">Confirmado</option>
                                    <option value="negou">Negou</option>
                                    <option value="desistiu">Desistiu</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="editarDevRestricaoMedica">Restricao medica</label>
                                <input type="text" class="form-control" id="editarDevRestricaoMedica">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="editarDevRestricaoAlimentar">Restricao alimentar</label>
                                <input type="text" class="form-control" id="editarDevRestricaoAlimentar">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="editarDevRestricaoMedicacao">Restricao de medicacao</label>
                                <input type="text" class="form-control" id="editarDevRestricaoMedicacao">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label d-block">Toca instrumento?</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="editarDevTocaInstrumento" id="editarDevTocaSim" value="sim">
                                    <label class="form-check-label" for="editarDevTocaSim">Sim</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="editarDevTocaInstrumento" id="editarDevTocaNao" value="nao">
                                    <label class="form-check-label" for="editarDevTocaNao">Nao</label>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label" for="editarDevInstrumentos">Quais instrumentos?</label>
                                <input type="text" class="form-control" id="editarDevInstrumentos">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label d-block">Canta?</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="editarDevCanta" id="editarDevCantaSim" value="sim">
                                    <label class="form-check-label" for="editarDevCantaSim">Sim</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="editarDevCanta" id="editarDevCantaNao" value="nao">
                                    <label class="form-check-label" for="editarDevCantaNao">Nao</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Quais equipes ja serviu?</label>
                                <div id="editarDevEquipesServidas" class="row g-2"></div>
                            </div>
                        </div>
                        <div class="text-end mt-3">
                            <button type="submit" class="btn btn-primary">Salvar Alteracoes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEscalarDev" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Escalar Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEscalarDev">
                        <input type="hidden" id="escalarDevUsuarioId">
                        <div class="mb-3">
                            <label class="form-label" for="escalarDevPerfil">Perfil de acesso</label>
                            <select class="form-select" id="escalarDevPerfil">
                                <option value="">Manter perfil atual</option>
                                <option value="equipista">Equipista</option>
                                <option value="coordenador">Coordenador</option>
                                <option value="equipe_dirigente">Equipe Dirigente</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="escalarDevEquipe">Equipe</label>
                            <select class="form-select" id="escalarDevEquipe">
                                <option value="">Manter equipe atual</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Confirmar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalHistoricoUsuarioDev" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Historico do Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="conteudoHistoricoUsuarioDev"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/desenvolvimento.js"></script>
</body>
</html>
